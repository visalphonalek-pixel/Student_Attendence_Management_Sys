<!DOCTYPE html>
<html>
<head>
    <title>Attendance Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard/">Attendance System</a>
    <a href="/logout/" class="btn btn-outline-light btn-sm">Logout</a>
</nav>
<div class="container mt-4">
    <div class="card p-4 shadow col-md-6">
        <h4>Attendance Record</h4>
        <hr>
        <p><strong>Session:</strong> {{ detail.attendance.classroom }} | {{ detail.attendance.subject }} | {{ detail.attendance.date }}</p>
        <p><strong>Student:</strong> {{ detail.student }}</p>
        <p><strong>Status:</strong> 
            <span class="badge 
                {% if detail.status == 'P' %}bg-success
                {% elif detail.status == 'A' %}bg-danger
                {% elif detail.status == 'L' %}bg-warning text-dark
                {% else %}bg-info{% endif %}">
                {{ detail.get_status_display }}
            </span>
        </p>
        <p><strong>Note:</strong> {{ detail.note|default:"—"|linebreaksbr }}</p>
        <a href="/attendance-details/{{ detail.pk }}/edit/" class="btn btn-warning">Edit</a>
        <a href="/attendances/{{ detail.attendance.pk }}/" class="btn btn-secondary">Back to Session</a>
    </div>
</div>
</body>
</html>
