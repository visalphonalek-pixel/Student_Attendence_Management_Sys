<!DOCTYPE html>
<html>
<head>
    <title>Delete Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard/">Attendance System</a>
    <a href="/logout/" class="btn btn-outline-light btn-sm">Logout</a>
</nav>
<div class="container mt-4">
    <div class="card p-4 shadow col-md-5">
        <h4>Delete Record</h4>
        <p>Are you sure you want to delete the record for <strong>{{ detail.student }}</strong> from <strong>{{ detail.attendance.classroom }} | {{ detail.attendance.date }}</strong>?</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="/attendances/{{ detail.attendance.pk }}/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
</body>
</html>
