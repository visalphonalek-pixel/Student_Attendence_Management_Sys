<!DOCTYPE html>
<html>
<head>
    <title>Classrooms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard/">Attendance System</a>
    <a href="/logout/" class="btn btn-outline-light btn-sm">Logout</a>
</nav>
<div class="container mt-4">
    <div class="d-flex justify-content-between mb-3">
        <h4>Classrooms</h4>
        <a href="/classes/create/" class="btn btn-primary">+ Add Classroom</a>
    </div>
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for classroom in classrooms %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ classroom.name }}</td>
                <td>{{ classroom.description }}</td>
                <td>
                    <a href="/classes/{{ classroom.pk }}/" class="btn btn-sm btn-info">View</a>
                    <a href="/classes/{{ classroom.pk }}/edit/" class="btn btn-sm btn-warning">Edit</a>
                    <a href="/classes/{{ classroom.pk }}/delete/" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center">No classrooms found</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
