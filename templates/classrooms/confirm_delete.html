<!DOCTYPE html>
<html>
<head>
    <title>Delete Classroom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="{% url 'dashboard' %}">Attendance System</a>
    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow border-danger">
                <h4>Delete Classroom</h4>
                <p>Are you sure you want to delete <strong>"{{ classroom.name }}"</strong>?</p>
                {% if classroom.students.all %}
                <div class="alert alert-warning">
                    <strong>Warning:</strong> This classroom has {{ classroom.students.count }} student(s). They will become unassigned.
                </div>
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'classroom_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
