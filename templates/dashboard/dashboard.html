<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Attendance System</span>
    <a href="/logout/" class="btn btn-outline-light btn-sm">Logout</a>
</nav>

<div class="container mt-4">
    <h4 class="mb-4">Dashboard</h4>
    <div class="row g-3">
        <div class="col-md-2">
            <div class="card text-center p-3 bg-primary text-white">
                <h2>{{ total_students }}</h2>
                <p>Students</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card text-center p-3 bg-success text-white">
                <h2>{{ total_classes }}</h2>
                <p>Classes</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card text-center p-3 bg-warning text-white">
                <h2>{{ total_subjects }}</h2>
                <p>Subjects</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card text-center p-3 bg-info text-white">
                <h2>{{ total_teachers }}</h2>
                <p>Teachers</p>
            </div>
        </div>
        <div class="col-md-2">
            <div class="card text-center p-3 bg-secondary text-white">
                <h2>{{ total_attendances }}</h2>
                <p>Attendance Sessions</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
