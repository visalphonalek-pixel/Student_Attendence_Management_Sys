<!DOCTYPE html>
<html>
<head>
    <title>Subject Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/dashboard/">Attendance System</a>
    <a href="/logout/" class="btn btn-outline-light btn-sm">Logout</a>
</nav>
<div class="container mt-4">
    <div class="card p-4 shadow col-md-6">
        <h4>Subject Detail</h4>
        <hr>
        <p><strong>Name:</strong> {{ subject.name }}</p>
        <p><strong>Description:</strong> {{ subject.description }}</p>
        <p><strong>Created:</strong> {{ subject.created_at }}</p>
        <a href="/subjects/{{ subject.pk }}/edit/" class="btn btn-warning">Edit</a>
        <a href="/subjects/" class="btn btn-secondary">Back</a>
    </div>
</div>
</body>
</html>
